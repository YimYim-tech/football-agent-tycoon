<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Football Agent Tycoon</title>
<!-- Firebase CDN for multiplayer -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap');

:root {
  --bg: #080c10;
  --surface: #111827;
  --surface2: #1c2636;
  --border: #1e3a5f;
  --accent: #00d4ff;
  --green: #00ff88;
  --red: #ff3b5c;
  --gold: #ffd700;
  --text: #e8f4f8;
  --muted: #6b8caa;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  font-family: 'DM Sans', sans-serif;
  background: var(--bg); color: var(--text);
  -webkit-user-select: none; user-select: none;
}

/* ─── LAYOUT ─────────────────────────────────────── */
#app { display: flex; flex-direction: column; height: 100%; width: 100%; }

#topBar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 56px; padding: 0 16px;
  display: flex; align-items: center; justify-content: space-between;
  background: linear-gradient(180deg, var(--bg) 0%, rgba(8,12,16,0.95) 100%);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
}
#topBar .left-group { display: flex; align-items: center; gap: 8px; }
#topBar .agency-name { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px; color: var(--accent); }
#topBar .season-label { font-size: 12px; color: var(--muted); }
#topBar .budget { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--green); }
#topBar .rep { font-size: 12px; color: var(--gold); }
.mute-btn {
  background: none; border: none; font-size: 20px; cursor: pointer;
  color: var(--muted); padding: 4px; min-width: 32px; min-height: 32px;
  display: flex; align-items: center; justify-content: center;
}

#content {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 64px 12px 88px 12px;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
}

#bottomNav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  height: calc(72px + env(safe-area-inset-bottom, 0px));
  padding-bottom: env(safe-area-inset-bottom, 0px);
  display: flex; align-items: center; justify-content: space-around;
  background: linear-gradient(0deg, var(--bg) 0%, rgba(8,12,16,0.97) 100%);
  border-top: 1px solid var(--border);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
}
.nav-tab {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 8px 4px; min-width: 56px; min-height: 48px;
  background: none; border: none; color: var(--muted);
  font-size: 20px; cursor: pointer; transition: color 0.2s;
}
.nav-tab span { font-size: 10px; font-family: 'DM Sans', sans-serif; }
.nav-tab.active { color: var(--accent); }

/* ─── CARDS ──────────────────────────────────────── */
.card {
  background: var(--surface);
  border-radius: 16px;
  border: 1px solid var(--border);
  box-shadow: 0 4px 24px rgba(0,212,255,0.06);
  padding: 16px;
  margin-bottom: 12px;
}
.card-glow { box-shadow: 0 4px 24px rgba(0,212,255,0.15); }

/* ─── PLAYER CARDS ───────────────────────────────── */
.player-card {
  background: var(--surface);
  border-radius: 16px;
  border: 1px solid var(--border);
  border-left: 4px solid #6b7280;
  padding: 16px;
  margin-bottom: 12px;
  transition: transform 0.2s;
}
.player-card:active { transform: scale(0.98); }
.player-card.tier-rookie { border-left-color: #6b7280; }
.player-card.tier-prospect { border-left-color: #ffd700; }
.player-card.tier-star { border-left-color: #3b82f6; }
.player-card.tier-elite { border-left-color: #a855f7; }
.player-card.tier-legend { border-left-color: #ef4444; }

.player-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.player-name { font-weight: 700; font-size: 16px; }
.player-pos { font-family: 'Bebas Neue', sans-serif; font-size: 14px; color: var(--accent); background: rgba(0,212,255,0.1); padding: 2px 8px; border-radius: 6px; }
.player-meta { font-size: 13px; color: var(--muted); margin-bottom: 10px; }

.rating-bar { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; margin: 6px 0; }
.rating-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease-out; }
.rating-fill.tier-rookie { background: #6b7280; }
.rating-fill.tier-prospect { background: linear-gradient(90deg, #ffd700, #ffaa00); }
.rating-fill.tier-star { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
.rating-fill.tier-elite { background: linear-gradient(90deg, #a855f7, #c084fc); }
.rating-fill.tier-legend { background: linear-gradient(90deg, #ef4444, #f97316); }

.stars { color: var(--gold); font-size: 14px; letter-spacing: 2px; }
.trait-badge { display: inline-block; font-size: 12px; padding: 3px 10px; border-radius: 12px; background: rgba(0,212,255,0.1); color: var(--accent); margin-top: 4px; }

/* ─── BUTTONS ────────────────────────────────────── */
.btn {
  display: block; width: 100%; min-height: 48px;
  padding: 12px 20px;
  border: none; border-radius: 12px;
  font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
  text-align: center;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--accent); color: var(--bg); }
.btn-green { background: var(--green); color: var(--bg); }
.btn-red { background: var(--red); color: #fff; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-gold { background: linear-gradient(135deg, #ffd700, #ffaa00); color: var(--bg); }
.btn-small { min-height: 40px; padding: 8px 16px; font-size: 13px; }
.btn-disabled { opacity: 0.4; pointer-events: none; }

@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 8px rgba(0,212,255,0.3); }
  50% { box-shadow: 0 0 20px rgba(0,212,255,0.6); }
}
.btn-pulse { animation: pulse-glow 2s ease-in-out infinite; }

.btn-row { display: flex; gap: 8px; margin-top: 12px; }
.btn-row .btn { flex: 1; }

/* ─── BOTTOM SHEET (FIX #1: solid background, higher z-index, bright border) ─── */
#overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.7);
}
#overlay.show { display: block; }

#bottomSheet {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 250;
  background: #111d2e;
  border-radius: 24px 24px 0 0;
  border-top: 3px solid var(--accent);
  box-shadow: 0 -8px 40px rgba(0,212,255,0.2);
  padding: 20px 16px calc(20px + env(safe-area-inset-bottom, 0px)) 16px;
  max-height: 85vh; overflow-y: auto;
  transform: translateY(100%);
  transition: transform 0.3s ease-out;
}
#bottomSheet.show { transform: translateY(0); }
.sheet-handle { width: 40px; height: 4px; background: var(--muted); border-radius: 2px; margin: 0 auto 16px; }
.sheet-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; margin-bottom: 4px; }
.sheet-subtitle { font-size: 13px; color: var(--muted); margin-bottom: 16px; }

/* ─── TOAST ──────────────────────────────────────── */
#toastContainer {
  position: fixed; top: 60px; left: 12px; right: 12px; z-index: 300;
  display: flex; flex-direction: column; gap: 8px;
  pointer-events: none;
}
.toast {
  padding: 14px 16px; border-radius: 12px;
  font-size: 14px; font-weight: 600;
  transform: translateY(-80px); opacity: 0;
  transition: all 0.3s ease-out;
  pointer-events: auto;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast-success { background: linear-gradient(135deg, rgba(0,255,136,0.15), rgba(0,255,136,0.05)); border: 1px solid var(--green); color: var(--green); }
.toast-error { background: linear-gradient(135deg, rgba(255,59,92,0.15), rgba(255,59,92,0.05)); border: 1px solid var(--red); color: var(--red); }
.toast-info { background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(0,212,255,0.05)); border: 1px solid var(--accent); color: var(--accent); }

/* ─── SCREEN FLASH ───────────────────────────────── */
#screenFlash {
  display: none; position: fixed; inset: 0; z-index: 400;
  pointer-events: none;
}

/* ─── CONFETTI ───────────────────────────────────── */
#confettiContainer {
  position: fixed; inset: 0; z-index: 350;
  pointer-events: none; overflow: hidden;
}
.confetti-piece {
  position: absolute; width: 10px; height: 10px; border-radius: 2px;
  left: 50%; top: 50%;
}

/* ─── SEASON TRANSITION ──────────────────────────── */
#seasonOverlay {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: var(--bg);
  flex-direction: column; align-items: center; justify-content: center;
}
#seasonOverlay.show { display: flex; }
#seasonOverlay .season-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 72px; color: var(--accent);
  letter-spacing: 4px;
}
#seasonOverlay .season-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px; color: var(--muted);
  letter-spacing: 6px;
}

/* ─── SPLASH SCREEN (FIX #7a: user-select text for input) ─── */
#splashScreen {
  position: fixed; inset: 0; z-index: 600;
  background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 24px;
}
#splashScreen.hidden { display: none; }
.splash-title { font-family: 'Bebas Neue', sans-serif; font-size: 42px; color: var(--accent); text-align: center; letter-spacing: 2px; line-height: 1.1; }
.splash-subtitle { font-size: 13px; color: var(--muted); text-align: center; margin: 16px 0 32px; line-height: 1.5; font-style: italic; }
.splash-input {
  width: 100%; max-width: 320px;
  padding: 14px 16px; border-radius: 12px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); font-size: 18px; font-family: 'DM Sans', sans-serif;
  text-align: center; outline: none;
  margin-bottom: 24px;
  -webkit-user-select: text; user-select: text;
}
.splash-input:focus { border-color: var(--accent); box-shadow: 0 0 12px rgba(0,212,255,0.2); }
.splash-input::placeholder { color: var(--muted); }

.diff-options { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 320px; margin-bottom: 24px; }
.diff-btn {
  min-height: 48px; padding: 12px 16px;
  border-radius: 12px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text);
  font-size: 15px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; gap: 10px;
  transition: all 0.2s;
}
.diff-btn.selected { border-color: var(--accent); background: rgba(0,212,255,0.1); }
.diff-btn:active { transform: scale(0.98); }

/* ─── FULL SCREEN OVERLAYS (Season End, Final) ──── */
#seasonEndScreen, #finalScreen {
  display: none; position: fixed; inset: 0; z-index: 550;
  background: var(--bg);
  flex-direction: column; align-items: center; justify-content: flex-start;
  padding: 40px 16px; overflow-y: auto;
}
#seasonEndScreen .card, #finalScreen .card { width: 100%; max-width: 380px; }
#seasonEndScreen.show, #finalScreen.show { display: flex; }

.end-title { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--accent); letter-spacing: 3px; text-align: center; margin-bottom: 6px; }
.end-divider { width: 60px; height: 2px; background: var(--accent); margin: 8px auto 20px; }
.end-stat { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(30,58,95,0.5); font-size: 14px; }
.end-stat .label { color: var(--muted); }
.end-stat .value { font-weight: 700; }
.end-stat .value.green { color: var(--green); }
.end-stat .value.gold { color: var(--gold); }
.end-headline { background: var(--surface); border-radius: 10px; padding: 10px 14px; margin: 6px 0; font-size: 13px; color: var(--text); }
.end-headline::before { content: ""; margin-right: 6px; }

.grade-display { font-family: 'Bebas Neue', sans-serif; font-size: 80px; margin: 16px 0; }
.grade-S-plus { color: var(--gold); text-shadow: 0 0 30px rgba(255,215,0,0.5); }
.grade-S { color: var(--gold); }
.grade-A { color: var(--green); }
.grade-B { color: var(--accent); }
.grade-C { color: var(--muted); }
.grade-D { color: var(--red); }

.final-tagline { font-size: 14px; color: var(--muted); text-align: center; font-style: italic; margin: 8px 0 24px; }

/* ─── FILTER ROW ─────────────────────────────────── */
.filter-row {
  display: flex; gap: 8px; overflow-x: auto; padding: 4px 0 12px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }
.filter-chip {
  flex-shrink: 0; padding: 8px 16px; border-radius: 20px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.filter-chip.active { background: rgba(0,212,255,0.15); border-color: var(--accent); color: var(--accent); }

/* ─── OFFER CARD ─────────────────────────────────── */
.offer-card {
  background: var(--surface);
  border-radius: 16px; border: 1px solid var(--border);
  padding: 16px; margin-bottom: 12px;
}
.offer-club { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--text); }
.offer-amount { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--green); margin: 8px 0; }
.offer-commission { font-size: 13px; color: var(--gold); }
.offer-expires { font-size: 12px; color: var(--red); margin-top: 6px; }

/* ─── MISC ───────────────────────────────────────── */
.section-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; margin-bottom: 12px; }
.section-subtitle { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
.money { font-family: 'Bebas Neue', sans-serif; color: var(--green); }
.money-red { font-family: 'Bebas Neue', sans-serif; color: var(--red); }

.vocab-card {
  background: linear-gradient(135deg, rgba(0,212,255,0.08), rgba(0,212,255,0.02));
  border: 1px solid rgba(0,212,255,0.2);
  border-radius: 16px; padding: 14px 16px; margin-bottom: 12px;
}
.vocab-word { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--accent); }
.vocab-def { font-size: 13px; color: var(--muted); margin-top: 4px; }

.ivan-card {
  background: linear-gradient(135deg, rgba(255,59,92,0.08), rgba(255,59,92,0.02));
  border: 1px solid rgba(255,59,92,0.2);
  border-radius: 16px; padding: 14px 16px; margin-bottom: 12px;
}

.event-banner {
  background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,215,0,0.03));
  border: 1px solid rgba(255,215,0,0.3);
  border-radius: 16px; padding: 14px 16px; margin-bottom: 12px;
}
.event-text { font-size: 14px; font-weight: 600; }
.event-effect { font-size: 12px; color: var(--gold); margin-top: 4px; }

.squad-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; background: var(--surface);
  border-radius: 12px; border: 1px solid var(--border);
  margin-bottom: 8px; min-height: 48px;
  cursor: pointer; transition: background 0.2s;
}
.squad-row:active { background: var(--surface2); }

.empty-state {
  text-align: center; padding: 40px 20px; color: var(--muted);
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state .msg { font-size: 14px; }

/* Card flip animation */
@keyframes cardFlip {
  0% { transform: perspective(600px) rotateY(90deg); opacity: 0; }
  100% { transform: perspective(600px) rotateY(0); opacity: 1; }
}
.card-flip { animation: cardFlip 0.4s ease-out; }

/* Confetti */
@keyframes confetti-fall {
  0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) rotate(var(--rot)); opacity: 0; }
}

/* Screen flash */
@keyframes flash-anim {
  0% { opacity: 0; }
  30% { opacity: 0.3; }
  100% { opacity: 0; }
}

/* Typing effect */
@keyframes blink-cursor {
  0%, 100% { border-right-color: var(--accent); }
  50% { border-right-color: transparent; }
}

/* ─── INJURY BADGE ───────────────────────────────── */
.injury-badge {
  display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 8px;
  background: rgba(255,59,92,0.15); color: var(--red); margin-left: 6px;
}
.mood-badge {
  font-size: 14px; margin-left: 4px;
}

/* Hide scrollbar */
#content::-webkit-scrollbar { display: none; }
#content { scrollbar-width: none; }

/* Landscape warning (optional) */
@media (orientation: landscape) and (max-height: 500px) {
  #topBar { height: 44px; }
  #content { padding-top: 52px; }
}

/* ─── FIX #4 & #5: Tutorial hint ─────────────────── */
@keyframes hint-pulse {
  0%, 100% { box-shadow: 0 0 8px rgba(0,212,255,0.2); }
  50% { box-shadow: 0 0 20px rgba(0,212,255,0.5); }
}
.tutorial-hint {
  background: linear-gradient(135deg, rgba(0,212,255,0.12), rgba(0,212,255,0.04));
  border: 1px solid rgba(0,212,255,0.3);
  border-radius: 16px; padding: 14px 16px; margin-bottom: 12px;
  animation: hint-pulse 2s ease-in-out infinite;
  cursor: pointer;
  font-size: 14px; line-height: 1.6;
}

/* ─── Season step guide ──────────────────────────── */
.checklist-card {
  background: var(--surface);
  border-radius: 16px; border: 1px solid var(--border);
  padding: 14px 16px; margin-bottom: 12px;
}
.checklist-item {
  padding: 6px 0; font-size: 14px; display: flex; align-items: center; gap: 8px;
}
.checklist-item.done { color: var(--green); }
.checklist-item.pending { color: var(--muted); }

/* ─── FIX #7d: Train tab single column on small screens ─── */
.train-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}
@media (max-width: 420px) {
  .train-grid { grid-template-columns: 1fr; }
}

/* ─── Continue button on splash ──────────────────── */
.btn-continue {
  background: transparent; border: 1px solid var(--accent); color: var(--accent);
  margin-bottom: 12px;
}

/* ─── SPECIAL PLAYER CARD (John Pedro) ──────────── */
.card-special {
  border: 2px solid var(--gold) !important;
  border-left: 4px solid var(--gold) !important;
  background: linear-gradient(135deg, rgba(255,215,0,0.08), var(--surface)) !important;
  box-shadow: 0 0 20px rgba(255,215,0,0.15);
  position: relative;
  overflow: hidden;
}
.card-special::before {
  content: '\1F48E';
  position: absolute; top: 8px; right: 8px; font-size: 20px;
  animation: sparkle 2s ease-in-out infinite;
}
@keyframes sparkle {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.2); }
}
.special-story {
  background: linear-gradient(135deg, rgba(255,215,0,0.08), rgba(255,215,0,0.02));
  border: 1px solid rgba(255,215,0,0.2);
  border-radius: 12px; padding: 10px 14px; margin-top: 8px;
  font-size: 13px; color: var(--gold); font-style: italic; line-height: 1.5;
}

/* ─── TRAINING CANVAS ───────────────────────────── */
.mini-game-container canvas {
  width: 100%; border-radius: 12px;
  touch-action: none; display: block; margin-bottom: 12px;
}
.mini-game-hud {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px; font-size: 14px; font-weight: 600;
}
.mini-game-timer {
  height: 6px; background: var(--surface2); border-radius: 3px;
  overflow: hidden; margin-bottom: 12px;
}
.mini-game-timer-fill {
  height: 100%; background: var(--accent); border-radius: 3px;
  transition: width 0.1s linear;
}
.mini-game-result {
  text-align: center; padding: 20px;
}
.mini-game-result .score-big {
  font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: var(--accent);
}

/* ─── MATCH DAY ─────────────────────────────────── */
.match-card {
  background: linear-gradient(135deg, rgba(0,255,136,0.06), var(--surface));
  border: 1px solid rgba(0,255,136,0.2);
  border-radius: 16px; padding: 14px 16px; margin-bottom: 10px;
  cursor: pointer; transition: transform 0.2s;
}
.match-card:active { transform: scale(0.98); }
.match-scoreboard {
  font-family: 'Bebas Neue', sans-serif; font-size: 28px;
  text-align: center; padding: 8px; margin-bottom: 8px;
}
.match-commentary {
  max-height: 120px; overflow-y: auto; padding: 8px;
  background: rgba(0,0,0,0.3); border-radius: 8px;
  font-size: 12px; line-height: 1.6; color: var(--muted);
}
.match-commentary div { padding: 2px 0; }
.match-commentary .goal-event { color: var(--green); font-weight: 700; }
.match-commentary .card-event { color: var(--gold); }

// ─── FIX #6: SOUND EFFECTS (Web Audio API) ─────────────
function playSound(type) {
  if (state.soundMuted) return;
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    if (type === 'sign') { osc.frequency.value = 523; gain.gain.value = 0.3; }
    else if (type === 'sell') { osc.frequency.value = 659; gain.gain.value = 0.3; }
    else if (type === 'train') { osc.frequency.value = 440; gain.gain.value = 0.2; }
    else if (type === 'error') { osc.frequency.value = 200; gain.gain.value = 0.3; }
    else if (type === 'coin') { osc.frequency.value = 880; gain.gain.value = 0.2; }
    else { osc.frequency.value = 600; gain.gain.value = 0.2; }
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    osc.stop(ctx.currentTime + 0.3);
  } catch(e) {}
}

      var parsed = JSON.parse(s);
      Object.assign(state, parsed);
      // Backward compat for new fields
      if (!state.soldPlayers) state.soldPlayers = [];
      if (state.johnPedroSeen === undefined) state.johnPedroSeen = false;
      if (!state.gameMode) state.gameMode = "solo";
      if (!state.opponent) state.opponent = { name:"", season:0, budget:0, reputation:0, careerEarnings:0, rosterCount:0, rosterTopRating:0, lastMove:"", finished:false, finalGrade:null, finalEarnings:null };
      return true;
    }
  } catch(e) {}
  return false;
}

function hasSave() {
  return !!localStorage.getItem('fat_save');
}

function deleteSave() {
  localStorage.removeItem('fat_save');
}

// ─── PLAYER VALUE ──────────────────────────────────────
function calcValue(player) {
  var base = Math.pow(player.rating, 2) * 800;
  var ageMult = Math.max(0.3, (33 - player.age) / 15);
  var potBonus = (player.potentialRating - player.rating) * 30000;
  var val = Math.round((base * ageMult + potBonus) / 10000) * 10000;

  // World event modifiers
  if (state.worldEvent) {
    if (state.worldEvent.type === "value_boost") val = Math.round(val * (1 + state.worldEvent.value));
    if (state.worldEvent.type === "youth_boost" && player.age <= 21) val = Math.round(val * (1 + state.worldEvent.value));
    if (state.worldEvent.type === "flashy_boost" && player.trait && player.trait.name === "Flashy") val = Math.round(val * (1 + state.worldEvent.value));
  }
  return Math.max(50000, val);
}

function calcWages(player) {
  return Math.round((player.rating * 800 + (player.rating > 80 ? 15000 : 0)) / 1000) * 1000;
}

function calcWageBill() {
  return state.roster.reduce(function(sum, p) { return sum + calcWages(p); }, 0);
}

// ─── PLAYER GENERATION ─────────────────────────────────
function generatePlayer(ageMin, ageMax, ratingMin, ratingMax) {
  var nat = pick(NATIONALITIES);
  var names = NAMES[nat];
  var age = rand(ageMin, ageMax);
  var rating = rand(ratingMin, ratingMax);
  var potStars = clamp(Math.floor((rating + rand(5, 35)) / 20), 1, 5);
  var potentialRating = clamp(rating + potStars * rand(3, 6), rating, 99);
  var trait = Math.random() < 0.6 ? pick(TRAITS) : null;
  var pos = pick(POSITIONS);
  var signingFee = Math.round((rating * rating * 15 + age * 5000 + rand(10000, 100000)) / 10000) * 10000;

  return {
    id: state.playerIdCounter++,
    firstName: pick(names.first),
    lastName: pick(names.last),
    nationality: nat,
    flag: names.flag,
    age: age, rating: rating, potentialRating: potentialRating,
    potentialStars: potStars,
    position: pos,
    trait: trait,
    signingFee: signingFee,
    mood: "happy",
    seasonsNotTrained: 0,
    injured: false,
    seasonsSigned: 0
  };
}

// ─── JOHN PEDRO — SPECIAL PLAYER ────────────────────────
function createJohnPedro() {

function generateScoutPool() {
  state.availablePlayers = [];
  var rMin = 40, rMax = 62;
  if (state.reputation >= 20) { rMin = 45; rMax = 68; }
  if (state.reputation >= 40) { rMin = 50; rMax = 74; }
  if (state.reputation >= 60) { rMin = 55; rMax = 80; }
  if (state.reputation >= 80) { rMin = 60; rMax = 88; }

  for (var i = 0; i < 5; i++) {
    state.availablePlayers.push(generatePlayer(16, 24, rMin, rMax));
  }

  // Inject John Pedro in Season 1
  if (state.season === 1 && !state.johnPedroSeen) {
    var jpAlreadySigned = state.roster.some(function(p) { return p.special; });
    if (!jpAlreadySigned) {
      state.availablePlayers.unshift(createJohnPedro());
      state.johnPedroSeen = true;
    }
  }
}

// ─── CLUB OFFERS ───────────────────────────────────────
function generateClubOffers() {
  state.clubOffers = [];
  if (state.roster.length === 0) return;

  var numOffers = 3;
  if (state.worldEvent && state.worldEvent.type === "extra_offers") numOffers = 5;

  // Filter eligible clubs based on reputation
  var eligibleClubs = CLUBS.filter(function(c) {
    if (state.reputation < 30 && c.tier <= 2) return false;
    if (state.reputation < 50 && c.tier === 1) return false;
    if (state.reputation < 70 && c.tier === 1 && c.personality === "Splasher") return false;
    return true;
  });
  if (eligibleClubs.length === 0) eligibleClubs = CLUBS.filter(function(c) { return c.tier >= 3; });

  // Shuffle preferred positions each season
  eligibleClubs = eligibleClubs.map(function(c) {
    return Object.assign({}, c, { preferredPosition: pick(POSITIONS) });
  });

  var sellable = state.roster.filter(function(p) { return !p.injured; });
  if (sellable.length === 0) return;

  for (var i = 0; i < Math.min(numOffers, sellable.length); i++) {
    var player = sellable[i % sellable.length];
    var club = pick(eligibleClubs);
    var val = calcValue(player);

    var offerMult = 0.85;
    if (club.personality === "Splasher") offerMult = rand(95, 115) / 100;
    else if (club.personality === "Fair Dealer") offerMult = rand(80, 100) / 100;
    else offerMult = rand(70, 90) / 100;

    if (club.preferredPosition === player.position) offerMult += 0.1;

    // World event: tier3-4 budget boost
    if (state.worldEvent && state.worldEvent.type === "small_boost" && club.tier >= 3) {
      offerMult += 0.15;
    }
    // Tier1 cut
    if (state.worldEvent && state.worldEvent.type === "tier1_cut" && club.tier === 1) {
      offerMult -= 0.15;
    }

    var offerAmount = Math.round(val * offerMult / 10000) * 10000;
    if (offerAmount > club.maxBudget) continue;

    state.clubOffers.push({
      id: Date.now() + i,
      club: club,
      playerId: player.id,
      playerName: player.firstName + " " + player.lastName,
      playerPos: player.position,
      playerRating: player.rating,
      amount: Math.max(50000, offerAmount),
      negotiated: false
    });
  }
}

// ─── WORLD EVENT ───────────────────────────────────────
function pickWorldEvent() {
  state.worldEvent = pick(WORLD_EVENTS);
  if (state.worldEvent.type === "rep_boost" && state.reputation > 60) {
    state.reputation = clamp(state.reputation + state.worldEvent.value, 0, 100);
  }
}

// ─── CORE ACTIONS ──────────────────────────────────────
function signPlayer(player) {
  if (state.budget < player.signingFee) {
    showToast("Not enough budget! Need " + fmt(player.signingFee), "error");
    playSound('error');
    return false;
  }
  state.budget -= player.signingFee;
  state.roster.push(Object.assign({}, player, { seasonsNotTrained: 0, seasonsSigned: 0 }));
  state.availablePlayers = state.availablePlayers.filter(function(p) { return p.id !== player.id; });
  showToast("\u2705 Signed " + player.firstName + " " + player.lastName + "!", "success");
  playSound('sign');
  state.reputation = clamp(state.reputation + 1, 0, 100);
  updateTopBar();
  saveGame();
  return true;
}

function trainPlayer(playerId, method) {
  var player = state.roster.find(function(p) { return p.id === playerId; });
  if (!player) return;
  if (player.injured) {
    showToast(player.firstName + " is injured! Can't train.", "error");
    playSound('error');
    return;
  }

  var cost = 0, gainMin = 0, gainMax = 0, injuryChance = 0;
  if (method === "basic") { cost = 100000; gainMin = 1; gainMax = 3; injuryChance = 0; }
  else if (method === "intensive") { cost = 300000; gainMin = 3; gainMax = 7; injuryChance = 0.1; }
  else if (method === "loan") { cost = 0; gainMin = 2; gainMax = 8; injuryChance = 0.2; }

  // World event injury modifier
  if (state.worldEvent && state.worldEvent.type === "injury_up") {
    injuryChance += state.worldEvent.value;
  }

  if (state.budget < cost) {
    showToast("Not enough budget!", "error");
    playSound('error');
    return;
  }

  state.budget -= cost;

  // Mood modifier
  var moodPenalty = 0;
  if (player.mood === "neutral") moodPenalty = 1;
  if (player.mood === "unhappy") moodPenalty = Math.floor((gainMin + gainMax) / 4);

  var gain = rand(gainMin, gainMax) - moodPenalty;

  // Check injury
  if (Math.random() < injuryChance) {
    player.injured = true;
    gain = Math.max(0, Math.floor(gain / 2));
    showToast("\u{1FA79} " + player.firstName + " got injured during training!", "error");
    playSound('error');
    flashScreen("var(--red)");
  }

  var oldRating = player.rating;
  player.rating = clamp(player.rating + Math.max(0, gain), 0, player.potentialRating);
  player.seasonsNotTrained = 0;
  state.trainedThisSeason = true;
  if (player.mood === "unhappy") player.mood = "neutral";
  else if (player.mood === "neutral") player.mood = "happy";

  if (gain > 0 && !player.injured) {
    showToast("\u{1F4AA} " + player.firstName + " trained! +" + (player.rating - oldRating) + " rating!", "success");
    playSound('train');
  } else if (!player.injured) {
    showToast(player.firstName + " trained but no improvement this time.", "info");
    playSound('train');
  }

  updateTopBar();
  closeBottomSheet();
  renderCurrentTab();
  saveGame();
}

function acceptOffer(offerId) {
  var offer = state.clubOffers.find(function(o) { return o.id === offerId; });
  if (!offer) return;

  var agentFee = Math.round(offer.amount * 0.10);
  var totalIncome = offer.amount;
  state.budget += totalIncome;
  state.careerEarnings += totalIncome;
  state.roster = state.roster.filter(function(p) { return p.id !== offer.playerId; });
  state.clubOffers = state.clubOffers.filter(function(o) { return o.playerId !== offer.playerId; });
  state.reputation = clamp(state.reputation + (offer.club.tier <= 2 ? 4 : 2), 0, 100);
  state.dealsThisSeason = true;

  state.seasonLog.push({
    season: state.season,
    type: "sale",
    playerName: offer.playerName,
    club: offer.club.name,
    amount: offer.amount,
    commission: totalIncome
  });

  // Track sold player for Match Day
  state.soldPlayers.push({
    name: offer.playerName,
    club: offer.club.name,
    rating: offer.playerRating,
    season: state.season
  });

  showToast("\u{1F4B0} DEAL DONE! +" + fmt(totalIncome) + " earned!", "success");
  playSound('sell');
  if (offer.amount > 1000000) { confettiBurst(); playSound('coin'); }

  updateTopBar();
  closeBottomSheet();
  renderCurrentTab();
  saveGame();
}

function negotiate(offerId, strategy) {
  var offer = state.clubOffers.find(function(o) { return o.id === offerId; });
  if (!offer || offer.negotiated) return;

  offer.negotiated = true;
  var mult = 1;
  var success = false;

  if (strategy === "push") {
    // High risk high reward
    if (Math.random() < 0.45) {
      mult = 1 + rand(15, 30) / 100;
      success = true;
    } else {
      mult = 0.85;
    }
  } else if (strategy === "charm") {
    // Medium risk medium reward
    if (Math.random() < 0.6) {
      mult = 1 + rand(8, 18) / 100;
      success = true;
    } else {
      mult = 0.95;
    }
  } else if (strategy === "deadline") {
    // Safe small bump
    if (Math.random() < 0.75) {
      mult = 1 + rand(3, 10) / 100;
      success = true;
    } else {
      mult = 1;
    }
  }

  offer.amount = Math.round(offer.amount * mult / 10000) * 10000;

  if (success) {
    showToast("\u{1F91D} Negotiation success! New offer: " + fmt(offer.amount), "success");
    playSound('coin');
  } else {
    showToast("\u{1F615} Negotiation failed! Offer: " + fmt(offer.amount), "error");
    playSound('error');
    flashScreen("var(--red)");
  }

  closeBottomSheet();
  renderCurrentTab();
  saveGame();
}

function releasePlayer(playerId) {
  var player = state.roster.find(function(p) { return p.id === playerId; });
  if (!player) return;
  state.roster = state.roster.filter(function(p) { return p.id !== playerId; });
  state.clubOffers = state.clubOffers.filter(function(o) { return o.playerId !== playerId; });
  showToast(player.firstName + " " + player.lastName + " released.", "info");
  closeBottomSheet();
  renderCurrentTab();
  saveGame();
}

// ─── IVAN BOT ──────────────────────────────────────────
function ivanTakeTurn() {
  state.ivan.lastMove = "";
  var actions = [];

  // 1. Try to sign high-potential available player (never takes John Pedro)
  var goodPick = state.availablePlayers.find(function(p) { return p.potentialStars >= 4 && p.signingFee < 600000 && !p.special; });
  if (goodPick && state.ivan.budget >= goodPick.signingFee) {
    state.ivan.budget -= goodPick.signingFee;
    state.ivan.roster.push(Object.assign({}, goodPick));
    state.availablePlayers = state.availablePlayers.filter(function(p) { return p.id !== goodPick.id; });
    actions.push("Signed " + goodPick.flag + " " + goodPick.firstName);
    state.ivan.reputation = clamp(state.ivan.reputation + 2, 0, 100);
  }

  // 2. Train best player
  if (state.ivan.roster.length > 0) {
    var best = state.ivan.roster.reduce(function(a, b) { return a.rating > b.rating ? a : b; });
    var gain = rand(3, 7);
    best.rating = clamp(best.rating + gain, 0, 99);
    if (state.ivan.budget >= 300000) state.ivan.budget -= 300000;
  }

  // 3. Sell highest value player to tier 1-2
  if (state.ivan.roster.length > 1) {
    var toSell = state.ivan.roster.reduce(function(a, b) { return calcValue(a) > calcValue(b) ? a : b; });
    var val = calcValue(toSell);
    var commission = Math.round(val * 0.1);
    state.ivan.budget += commission;
    state.ivan.careerEarnings += commission;
    state.ivan.roster = state.ivan.roster.filter(function(p) { return p.id !== toSell.id; });
    state.ivan.reputation = clamp(state.ivan.reputation + 3, 0, 100);
    var club = pick(CLUBS.filter(function(c) { return c.tier <= 2; }));
    actions.push("Sold " + toSell.firstName + " to " + club.name + " for " + fmt(val));
  }

  // Age up Ivan's roster
  state.ivan.roster.forEach(function(p) {
    p.age++;
    if (p.age >= 30) p.rating = Math.max(40, p.rating - 1);
    if (p.age >= 33) p.rating = Math.max(35, p.rating - 2);
  });

  state.ivan.lastMove = actions.length > 0 ? actions.join(" | ") : "Quiet season";

  if (actions.length > 0) {
    showToast("\u{1F916} Ivan: " + actions[0], "info");
  }
}

// ─── MOOD SYSTEM ───────────────────────────────────────
function updateMoods() {
  state.roster.forEach(function(p) {
    if (p.seasonsNotTrained >= 2 && p.mood === "happy") p.mood = "neutral";
    if (p.seasonsNotTrained >= 3 && p.mood === "neutral") p.mood = "unhappy";
    p.seasonsNotTrained++;
  });
}

// ─── AGE UP ────────────────────────────────────────────
function ageUpRoster() {
  state.roster.forEach(function(p) {
    p.age++;
    p.seasonsSigned++;
    if (p.age >= 30) p.rating = Math.max(40, p.rating - 1);
    if (p.age >= 33) p.rating = Math.max(35, p.rating - 2);
    if (p.injured) p.injured = false; // recover next season
  });
}

// ─── END SEASON ────────────────────────────────────────
function endSeason() {
  if (state.seasonResultShown) return;
  state.seasonResultShown = true;

  // Deduct wages
  var wageBill = calcWageBill();
  state.budget -= wageBill;

  // Age up
  ageUpRoster();
  updateMoods();

  // Rival turn (Ivan in solo, skip in multiplayer)
  if (!isMultiplayer()) {
    ivanTakeTurn();
  } else {
    syncSeasonSnapshot();
  }

  // Find best deal
  var salesThisSeason = state.seasonLog.filter(function(l) { return l.season === state.season && l.type === "sale"; });
  var bestDeal = salesThisSeason.length > 0
    ? salesThisSeason.reduce(function(a, b) { return a.amount > b.amount ? a : b; })
    : null;

  var repChange = rand(-2, 5);
  state.reputation = clamp(state.reputation + repChange, 0, 100);

  saveGame();

  // Show season end screen
  showSeasonEndScreen(bestDeal, wageBill, repChange);
}

function advanceToNextSeason() {
  state.season++;
  state.seasonResultShown = false;
  state.trainedThisSeason = false;
  state.dealsThisSeason = false;

  if (state.season > 10) {
    if (isMultiplayer()) {
      handleMultiplayerEndGame();
    } else {
      showFinalScreen();
    }
    return;
  }

  // Season transition animation
  showSeasonTransition(state.season, function() {
    pickWorldEvent();
    generateScoutPool();
    generateClubOffers();
    updateTopBar();
    showTab("hub");
    saveGame();
  });
}

// ─── UI RENDERING ──────────────────────────────────────
function updateTopBar() {
  document.getElementById("topAgency").innerHTML = state.agencyName + (isMultiplayer() ? ' <span class="mp-badge">LIVE</span>' : '');
  document.getElementById("topSeason").textContent = "Season " + state.season + "/10";
  var budgetEl = document.getElementById("topBudget");
  budgetEl.textContent = fmt(state.budget);
  budgetEl.style.color = state.budget < 0 ? "var(--red)" : "var(--green)";
  document.getElementById("topRep").textContent = "\u2B50 " + state.reputation + " REP";
}

function showTab(tab) {
  state.currentTab = tab;
  document.querySelectorAll(".nav-tab").forEach(function(t) { t.classList.toggle("active", t.dataset.tab === tab); });
  document.getElementById("content").scrollTop = 0;
  renderCurrentTab();
}

function renderCurrentTab() {
  var c = document.getElementById("content");
  switch (state.currentTab) {
    case "hub": c.innerHTML = renderHub(); break;
    case "scout": c.innerHTML = renderScout(); break;
    case "train": c.innerHTML = renderTrain(); break;
    case "sell": c.innerHTML = renderSell(); break;
    case "squad": c.innerHTML = renderSquad(); break;
  }
}

  var filtered = state.scoutFilter === "ALL"

// ─── ANIMATIONS ────────────────────────────────────────
function showToast(msg, type) {
  var container = document.getElementById("toastContainer");
  var toast = document.createElement("div");
  toast.className = "toast toast-" + type;
  toast.textContent = msg;
  container.appendChild(toast);
  requestAnimationFrame(function() { toast.classList.add("show"); });
  setTimeout(function() {
    toast.classList.remove("show");
    setTimeout(function() { toast.remove(); }, 300);
  }, 2500);
}

function confettiBurst() {
  var container = document.getElementById("confettiContainer");
  var colors = ["#ffd700","#00ff88","#00d4ff","#ff3b5c","#a855f7","#3b82f6"];
  for (var i = 0; i < 30; i++) {
    var piece = document.createElement("div");
    piece.className = "confetti-piece";
    piece.style.background = pick(colors);
    var tx = rand(-200, 200) + "px";
    var ty = rand(-300, -50) + "px";
    var rot = rand(0, 720) + "deg";
    piece.style.setProperty("--tx", tx);
    piece.style.setProperty("--ty", ty);
    piece.style.setProperty("--rot", rot);
    piece.style.animation = "confetti-fall " + (0.6 + Math.random() * 0.8) + "s ease-out forwards";
    piece.style.animationDelay = (Math.random() * 0.2) + "s";
    container.appendChild(piece);
    (function(el) { setTimeout(function() { el.remove(); }, 2000); })(piece);
  }
}

function flashScreen(color) {
  var el = document.getElementById("screenFlash");
  el.style.background = color;
  el.style.display = "block";
  el.style.animation = "flash-anim 0.4s ease-out forwards";
  setTimeout(function() { el.style.display = "none"; el.style.animation = ""; }, 500);
}

function showSeasonTransition(n, callback) {
  var overlay = document.getElementById("seasonOverlay");
  var numEl = document.getElementById("seasonNum");
  overlay.classList.add("show");
  numEl.textContent = "";

  var text = String(n);
  var i = 0;
  var typeInterval = setInterval(function() {
    numEl.textContent += text[i];
    i++;
    if (i >= text.length) {
      clearInterval(typeInterval);
      setTimeout(function() {
        overlay.classList.remove("show");
        if (callback) callback();
      }, 800);
    }
  }, 200);
}

function animateMoney(from, to, element) {
  var duration = 600;
  var start = performance.now();
  function step(ts) {
    var progress = Math.min((ts - start) / duration, 1);
    var current = Math.round(from + (to - from) * progress);
    element.textContent = fmt(current);
    if (progress < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ─── FINAL SCREEN ──────────────────────────────────────
function showFinalScreen() {
  var screen = document.getElementById("finalScreen");
  var grade, gradeClass, tagline;

  if (state.careerEarnings > 50000000) { grade = "S+"; gradeClass = "grade-S-plus"; tagline = "The Greatest Agent of All Time."; }
  else if (state.careerEarnings > 35000000) { grade = "S"; gradeClass = "grade-S"; tagline = "Legendary Agent \u2014 a name for the history books."; }
  else if (state.careerEarnings > 25000000) { grade = "A"; gradeClass = "grade-A"; tagline = "Elite Agent \u2014 The Premier League knows your name."; }
  else if (state.careerEarnings > 15000000) { grade = "B"; gradeClass = "grade-B"; tagline = "Great Agent \u2014 solid career, strong reputation."; }
  else if (state.careerEarnings > 8000000) { grade = "C"; gradeClass = "grade-C"; tagline = "Decent Agent \u2014 room to grow next time."; }
  else { grade = "D"; gradeClass = "grade-D"; tagline = "Rookie Agent \u2014 try a different strategy!"; }

  // Find biggest deal
  var allSales = state.seasonLog.filter(function(l) { return l.type === "sale"; });
  var biggestDeal = allSales.length > 0 ? allSales.reduce(function(a, b) { return a.amount > b.amount ? a : b; }) : null;

  var html = '';
  html += '<div style="font-size:14px;color:var(--muted);letter-spacing:4px;margin-bottom:4px;">CAREER COMPLETE</div>';
  html += '<div style="width:80px;height:2px;background:var(--accent);margin:8px auto 16px;"></div>';

  html += '<div class="grade-display ' + gradeClass + '">\u26A1 ' + grade + ' \u26A1</div>';
  html += '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:22px;color:var(--accent);">' + state.agencyName + '</div>';
  html += '<div class="final-tagline">"' + tagline + '"</div>';

  html += '<div class="card" style="width:100%;max-width:350px;">';
  html += '<div class="end-stat"><span class="label">Career Earnings</span><span class="value green">' + fmt(state.careerEarnings) + '</span></div>';
  html += '<div class="end-stat"><span class="label">Players Sold</span><span class="value">' + allSales.length + '</span></div>';
  if (biggestDeal) html += '<div class="end-stat"><span class="label">Biggest Deal</span><span class="value green">' + fmt(biggestDeal.amount) + '</span></div>';
  html += '<div class="end-stat"><span class="label">Peak Reputation</span><span class="value gold">' + state.reputation + '</span></div>';
  if (biggestDeal) html += '<div class="end-stat"><span class="label">Biggest Club</span><span class="value">' + biggestDeal.club + '</span></div>';
  html += '</div>';

  html += '<button class="btn btn-primary" style="margin-top:16px;max-width:350px;" onclick="resetGame()">\u{1F504} PLAY AGAIN</button>';

  var scoreText = state.agencyName + " | Grade: " + grade + " | Earnings: " + fmt(state.careerEarnings) + " | Players Sold: " + allSales.length;

// ─── SHARED CANVAS UTILITIES ────────────────────────────
function drawPitch(ctx, w, h) {
  // Green pitch
  ctx.fillStyle = '#2d8b2d';
  ctx.fillRect(0, 0, w, h);
  // Darker stripes
  for (var i = 0; i < h; i += 40) {
    ctx.fillStyle = i % 80 === 0 ? '#2d8b2d' : '#278527';
    ctx.fillRect(0, i, w, 40);
  }
  // White lines
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 2;
  ctx.strokeRect(10, 10, w - 20, h - 20);
  // Center line
  ctx.beginPath();
  ctx.moveTo(10, h / 2);
  ctx.lineTo(w - 10, h / 2);
  ctx.stroke();
  // Center circle
  ctx.beginPath();
  ctx.arc(w / 2, h / 2, 40, 0, Math.PI * 2);
  ctx.stroke();
  // Goal areas
  ctx.strokeRect(w / 2 - 60, 10, 120, 40);
  ctx.strokeRect(w / 2 - 60, h - 50, 120, 40);
}

function getCanvasXY(e, canvas) {
  var rect = canvas.getBoundingClientRect();
  var touch = e.touches ? e.touches[0] : e;
  return {
    x: (touch.clientX - rect.left) * (canvas.width / rect.width),
    y: (touch.clientY - rect.top) * (canvas.height / rect.height)
  };
}

// ─── TRAINING MINI-GAMES ────────────────────────────────
var activeGame = null;

function launchMiniGame(playerId, gameType) {
  var player = state.roster.find(function(p) { return p.id === playerId; });
  if (!player) return;

  var costs = { shooting: 100000, passing: 200000, dribble: 300000 };
  var cost = costs[gameType] || 100000;
  if (state.budget < cost) {
    showToast("Not enough budget! Need " + fmt(cost), "error");
    playSound('error');
    return;
  }
  state.budget -= cost;
  updateTopBar();

  var html = '<div class="mini-game-container">';
  html += '<div class="sheet-title">' + gameType.toUpperCase() + ' TRAINING</div>';
  html += '<div class="mini-game-hud"><span id="mgScore">Score: 0</span><span id="mgTimer">Time: --</span></div>';
  html += '<div class="mini-game-timer"><div class="mini-game-timer-fill" id="mgTimerBar" style="width:100%"></div></div>';
  html += '<canvas id="trainCanvas" width="340" height="400"></canvas>';
  html += '</div>';

  openBottomSheet(html);

  setTimeout(function() {
    var canvas = document.getElementById('trainCanvas');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    if (gameType === 'shooting') miniGameShooting(canvas, ctx, player);
    else if (gameType === 'passing') miniGamePassing(canvas, ctx, player);
    else if (gameType === 'dribble') miniGameDribble(canvas, ctx, player);
  }, 100);
}

function applyTrainingResult(player, score, maxScore) {
  var pct = maxScore > 0 ? (score / maxScore) : 0;
  var gain = 0;
  if (pct > 0.8) gain = rand(3, 5);
  else if (pct > 0.5) gain = rand(2, 3);
  else if (pct > 0.2) gain = 1;

  // Mood modifier
  if (player.mood === "unhappy") gain = Math.max(0, gain - 1);

  var oldRating = player.rating;
  player.rating = clamp(player.rating + gain, 0, player.potentialRating);
  player.seasonsNotTrained = 0;
  state.trainedThisSeason = true;
  if (player.mood === "unhappy") player.mood = "neutral";
  else if (player.mood === "neutral") player.mood = "happy";

  var resultHTML = '<div class="mini-game-result">';
  resultHTML += '<div style="font-size:14px;color:var(--muted);margin-bottom:8px;">TRAINING COMPLETE</div>';
  resultHTML += '<div class="score-big">' + Math.round(pct * 100) + '%</div>';
  resultHTML += '<div style="font-size:16px;margin:8px 0;">' + player.firstName + ' ' + player.lastName + '</div>';
  if (gain > 0) {
    resultHTML += '<div style="font-size:24px;color:var(--green);font-weight:700;">+' + (player.rating - oldRating) + ' RATING!</div>';
    resultHTML += '<div style="font-size:14px;color:var(--muted);">' + oldRating + ' \u2192 ' + player.rating + '</div>';
  } else {
    resultHTML += '<div style="font-size:16px;color:var(--muted);">No improvement this time</div>';
  }
  resultHTML += '<button class="btn btn-primary" style="margin-top:16px;" onclick="closeBottomSheet();renderCurrentTab();">DONE</button>';
  resultHTML += '</div>';

  document.getElementById('sheetContent').innerHTML = resultHTML;

  if (gain > 0) {
    showToast("\u{1F4AA} " + player.firstName + " +" + (player.rating - oldRating) + " rating!", "success");
    playSound('train');
  } else {
    showToast("Training done, no improvement.", "info");
    playSound('train');
  }

  saveGame();
}

// ─── MINI-GAME: SHOOTING PRACTICE ──────────────────────
function miniGameShooting(canvas, ctx, player) {
  var w = canvas.width, h = canvas.height;
  var round = 0, maxRounds = 5, goals = 0;
  var phase = 'power'; // 'power', 'aim', 'animating', 'done'
  var power = 0, powerDir = 1, aimX = w / 2;
  var ballX = w / 2, ballY = h - 60, ballTargetX, ballTargetY;
  var animFrame = 0;
  var goalZones = [
    { x: w / 2 - 55, y: 25, w: 35, h: 30, label: 'L' },
    { x: w / 2 - 15, y: 25, w: 30, h: 30, label: 'C' },
    { x: w / 2 + 20, y: 25, w: 35, h: 30, label: 'R' }
  ];

  function draw() {
    drawPitch(ctx, w, h);
    // Goal
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillRect(w / 2 - 60, 10, 120, 40);
    // Goal zones
    goalZones.forEach(function(z) {
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(z.x, z.y, z.w, z.h);
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.font = '12px DM Sans';
      ctx.textAlign = 'center';
      ctx.fillText(z.label, z.x + z.w / 2, z.y + z.h / 2 + 4);
    });
    // Ball
    ctx.beginPath();
    ctx.arc(ballX, ballY, 10, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Power meter
    if (phase === 'power') {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(20, h - 30, w - 40, 16);
      var pW = (w - 44) * (power / 100);
      var pColor = power > 70 ? '#00ff88' : power > 40 ? '#ffd700' : '#ff3b5c';
      ctx.fillStyle = pColor;
      ctx.fillRect(22, h - 28, pW, 12);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 11px DM Sans';
      ctx.textAlign = 'center';
      ctx.fillText('TAP TO SET POWER', w / 2, h - 17);
    }
    // Aim marker
    if (phase === 'aim') {
      ctx.beginPath();
      ctx.arc(aimX, 35, 8, 0, Math.PI * 2);
      ctx.fillStyle = 'var(--accent)';
      ctx.fillStyle = '#00d4ff';
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 11px DM Sans';
      ctx.textAlign = 'center';
      ctx.fillText('TAP GOAL ZONE', w / 2, h - 17);
    }
    // Score display
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px Bebas Neue, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('Round ' + (round + 1) + '/' + maxRounds, 16, h - 42);
    ctx.textAlign = 'right';
    ctx.fillText('Goals: ' + goals, w - 16, h - 42);
  }

  function update() {
    if (phase === 'power') {
      power += powerDir * 2.5;
      if (power >= 100) { power = 100; powerDir = -1; }
      if (power <= 0) { power = 0; powerDir = 1; }
    }
    if (phase === 'aim') {
      aimX += powerDir * 3;
      if (aimX > w / 2 + 55) powerDir = -1;
      if (aimX < w / 2 - 55) powerDir = 1;
    }
    if (phase === 'animating') {
      animFrame++;
      ballX += (ballTargetX - w / 2) / 15;
      ballY += (ballTargetY - (h - 60)) / 15;
      if (animFrame > 15) {
        // Check if goal
        var isGoal = power > 35 && ballTargetY < 50;
        if (isGoal) goals++;
        round++;
        if (round >= maxRounds) {
          phase = 'done';
          document.getElementById('mgScore').textContent = 'Goals: ' + goals + '/' + maxRounds;
          setTimeout(function() { applyTrainingResult(player, goals, maxRounds); }, 500);
          return;
        }
        // Reset
        ballX = w / 2; ballY = h - 60;
        phase = 'power'; power = 0; powerDir = 1;
        animFrame = 0;
      }
    }

    draw();
    document.getElementById('mgScore').textContent = 'Goals: ' + goals;
    if (phase !== 'done') activeGame = requestAnimationFrame(update);
  }

  function onTap(e) {
    e.preventDefault();
    if (phase === 'power') {
      phase = 'aim';
      aimX = w / 2 - 55;
      powerDir = 1;
    } else if (phase === 'aim') {
      var pt = getCanvasXY(e, canvas);
      ballTargetX = pt.x;
      ballTargetY = power > 35 ? 35 : h / 2;
      phase = 'animating';
      animFrame = 0;
    }
  }

  canvas.addEventListener('touchstart', onTap, { passive: false });
  canvas.addEventListener('click', onTap);
  activeGame = requestAnimationFrame(update);
}

// ─── MINI-GAME: PASSING DRILL ──────────────────────────
function miniGamePassing(canvas, ctx, player) {
  var w = canvas.width, h = canvas.height;
  var score = 0, timeLeft = 8000, startTime = Date.now();
  var targets = [];
  var ballX = w / 2, ballY = h - 50;
  var passAnim = null; // { fromX, fromY, toX, toY, frame }

  function spawnTarget() {
    targets.push({
      x: rand(40, w - 40),
      y: rand(60, h - 120),
      dx: (Math.random() - 0.5) * 3,
      dy: (Math.random() - 0.5) * 2,
      radius: 18,
      hit: false,
      alpha: 1
    });
  }
  spawnTarget(); spawnTarget(); spawnTarget();

  function draw() {
    drawPitch(ctx, w, h);
    // Targets
    targets.forEach(function(t) {
      if (t.hit) return;
      ctx.beginPath();
      ctx.arc(t.x, t.y, t.radius, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,215,0,' + t.alpha + ')';
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 12px DM Sans';
      ctx.textAlign = 'center';
      ctx.fillText('\u{1F3AF}', t.x, t.y + 5);
    });
    // Pass animation
    if (passAnim) {
      var prog = passAnim.frame / 10;
      var px = passAnim.fromX + (passAnim.toX - passAnim.fromX) * prog;
      var py = passAnim.fromY + (passAnim.toY - passAnim.fromY) * prog;
      ctx.beginPath();
      ctx.arc(px, py, 8, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
    }
    // Player
    ctx.beginPath();
    ctx.arc(ballX, ballY, 14, 0, Math.PI * 2);
    ctx.fillStyle = '#00d4ff';
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px DM Sans';
    ctx.textAlign = 'center';
    ctx.fillText('YOU', ballX, ballY + 4);
  }

  function update() {
    var elapsed = Date.now() - startTime;
    timeLeft = Math.max(0, 8000 - elapsed);
    var pct = timeLeft / 8000;

    // Move targets
    targets.forEach(function(t) {
      if (t.hit) return;
      t.x += t.dx;
      t.y += t.dy;
      if (t.x < 30 || t.x > w - 30) t.dx *= -1;
      if (t.y < 50 || t.y > h - 100) t.dy *= -1;
      // Speed up over time
      if (elapsed > 4000) { t.dx *= 1.001; t.dy *= 1.001; }
    });

    // Pass animation
    if (passAnim) {
      passAnim.frame++;
      if (passAnim.frame >= 10) passAnim = null;
    }

    // Respawn hit targets
    if (targets.filter(function(t) { return !t.hit; }).length < 2) {
      spawnTarget();
    }

    draw();
    document.getElementById('mgScore').textContent = 'Hits: ' + score;
    document.getElementById('mgTimer').textContent = (timeLeft / 1000).toFixed(1) + 's';
    document.getElementById('mgTimerBar').style.width = (pct * 100) + '%';

    if (timeLeft <= 0) {
      setTimeout(function() { applyTrainingResult(player, score, 8); }, 500);
      return;
    }
    activeGame = requestAnimationFrame(update);
  }

  function onTap(e) {
    e.preventDefault();
    var pt = getCanvasXY(e, canvas);
    // Check hit on targets
    for (var i = 0; i < targets.length; i++) {
      var t = targets[i];
      if (t.hit) continue;
      var dx = pt.x - t.x, dy = pt.y - t.y;
      if (Math.sqrt(dx * dx + dy * dy) < t.radius + 10) {
        t.hit = true;
        score++;
        passAnim = { fromX: ballX, fromY: ballY, toX: t.x, toY: t.y, frame: 0 };
        playSound('coin');
        break;
      }
    }
  }

  canvas.addEventListener('touchstart', onTap, { passive: false });
  canvas.addEventListener('click', onTap);
  activeGame = requestAnimationFrame(update);
}

// ─── MINI-GAME: DRIBBLE RUN ────────────────────────────
function miniGameDribble(canvas, ctx, player) {
  var w = canvas.width, h = canvas.height;
  var playerX = w / 2, laneW = 80;
  var cones = [], score = 0, missed = 0, totalCones = 0;
  var timeLeft = 10000, startTime = Date.now();
  var coneSpeed = 2;
  var lastCone = 0;

  function spawnCone() {
    var lane = pick([-1, 0, 1]);
    cones.push({ x: w / 2 + lane * laneW, y: -20, passed: false });
    totalCones++;
  }

  function draw() {
    // Pitch background
    ctx.fillStyle = '#2d8b2d';
    ctx.fillRect(0, 0, w, h);
    // Lane lines
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1;
    ctx.setLineDash([10, 10]);
    for (var i = -1; i <= 1; i++) {
      ctx.beginPath();
      ctx.moveTo(w / 2 + i * laneW - laneW / 2, 0);
      ctx.lineTo(w / 2 + i * laneW - laneW / 2, h);
      ctx.stroke();
    }
    ctx.setLineDash([]);
    // Cones
    cones.forEach(function(c) {
      if (c.passed) return;
      ctx.font = '24px serif';
      ctx.textAlign = 'center';
      ctx.fillText('\u{1F9E7}', c.x, c.y + 8);
    });
    // Player
    ctx.beginPath();
    ctx.arc(playerX, h - 60, 16, 0, Math.PI * 2);
    ctx.fillStyle = '#00d4ff';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
    // Ball at player's feet
    ctx.beginPath();
    ctx.arc(playerX + 8, h - 48, 6, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
  }

  function update() {
    var elapsed = Date.now() - startTime;
    timeLeft = Math.max(0, 10000 - elapsed);
    var pct = timeLeft / 10000;

    // Speed increases
    coneSpeed = 2 + elapsed / 3000;

    // Spawn cones
    if (elapsed - lastCone > 600) {
      spawnCone();
      lastCone = elapsed;
    }

    // Move cones
    cones.forEach(function(c) {
      if (c.passed) return;
      c.y += coneSpeed;
      // Check collision with player
      if (c.y > h - 80 && c.y < h - 40 && Math.abs(c.x - playerX) < 30) {
        c.passed = true;
        missed++;
        playSound('error');
      }
      // Passed safely
      if (c.y > h - 30 && !c.passed) {
        c.passed = true;
        score++;
      }
    });

    draw();
    document.getElementById('mgScore').textContent = 'Dodged: ' + score;
    document.getElementById('mgTimer').textContent = (timeLeft / 1000).toFixed(1) + 's';
    document.getElementById('mgTimerBar').style.width = (pct * 100) + '%';

    if (timeLeft <= 0) {
      var total = score + missed;
      setTimeout(function() { applyTrainingResult(player, score, Math.max(total, 1)); }, 500);
      return;
    }
    activeGame = requestAnimationFrame(update);
  }

  var touchStartX = null;
  function onTouchStart(e) {
    e.preventDefault();
    touchStartX = getCanvasXY(e, canvas).x;
  }
  function onTouchMove(e) {
    e.preventDefault();
    var pt = getCanvasXY(e, canvas);
    if (touchStartX !== null) {
      var diff = pt.x - touchStartX;
      playerX = clamp(playerX + diff, w / 2 - laneW, w / 2 + laneW);
      touchStartX = pt.x;
    }
  }
  function onClick(e) {
    var pt = getCanvasXY(e, canvas);
    // Tap left/right to move
    if (pt.x < w / 3) playerX = clamp(playerX - laneW, w / 2 - laneW, w / 2 + laneW);
    else if (pt.x > w * 2 / 3) playerX = clamp(playerX + laneW, w / 2 - laneW, w / 2 + laneW);
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('click', onClick);
  activeGame = requestAnimationFrame(update);
}

  "Manchester City":"#6CABDD", "Arsenal":"#EF0107", "Chelsea":"#034694",
  "Liverpool":"#C8102E", "Manchester United":"#DA291C", "Tottenham Hotspur":"#132257",
  "Newcastle United":"#241F20", "Aston Villa":"#670E36", "Brighton":"#0057B8",
  "West Ham":"#7A263A", "Fulham":"#000000", "Wolves":"#FDB913",
  "Everton":"#003399", "Crystal Palace":"#1B458F", "Brentford":"#e30613",
  "Nottingham Forest":"#DD0000", "Leicester City":"#003090", "Bournemouth":"#DA291C",
  "Ipswich Town":"#0033A0", "Southampton":"#D71920"
};

function startMatchDay(idx) {

function runMatchSimulation(canvas, ctx, soldPlayer, opponent) {
  var w = canvas.width, h = canvas.height;
  var minute = 0, homeScore = 0, awayScore = 0;
  var events = [];
  var ballX = w / 2, ballY = h / 2;
  var homeColor = CLUB_COLORS[soldPlayer.club] || '#00d4ff';
  var awayColor = CLUB_COLORS[opponent.name] || '#ff3b5c';

  // Generate player dots
  var homePlayers = [], awayPlayers = [];
  for (var i = 0; i < 11; i++) {
    homePlayers.push({ x: rand(30, w - 30), y: rand(h / 2 + 20, h - 30), baseX: 0, baseY: 0 });
    awayPlayers.push({ x: rand(30, w - 30), y: rand(30, h / 2 - 20), baseX: 0, baseY: 0 });
  }
  homePlayers.forEach(function(p) { p.baseX = p.x; p.baseY = p.y; });
  awayPlayers.forEach(function(p) { p.baseX = p.x; p.baseY = p.y; });

  // Mark one home player as "your player"
  var starIdx = 0;
  var starPlayer = homePlayers[starIdx];

  var lastEventMin = -5;
  var matchOver = false;
  var yourPlayerGoals = 0, yourPlayerAssists = 0, yourPlayerCards = 0;

  function addCommentary(text, cls) {
    events.push({ text: text, cls: cls || '' });
    var comm = document.getElementById('matchComm');
    if (comm) {
      var div = document.createElement('div');
      div.className = cls || '';
      div.textContent = text;
      comm.appendChild(div);
      comm.scrollTop = comm.scrollHeight;
    }
  }

  function draw() {
    drawPitch(ctx, w, h);
    // Home players
    homePlayers.forEach(function(p, i) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, i === starIdx ? 8 : 6, 0, Math.PI * 2);
      ctx.fillStyle = homeColor;
      ctx.fill();
      if (i === starIdx) {
        ctx.strokeStyle = '#ffd700';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    });
    // Away players
    awayPlayers.forEach(function(p) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
      ctx.fillStyle = awayColor;
      ctx.fill();
    });
    // Ball
    ctx.beginPath();
    ctx.arc(ballX, ballY, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
  }

  function update() {
    if (matchOver) return;

    minute += 0.3;

    // Move players randomly near their base
    homePlayers.forEach(function(p) {
      p.x = p.baseX + Math.sin(Date.now() / 1000 + p.baseX) * 20;
      p.y = p.baseY + Math.cos(Date.now() / 800 + p.baseY) * 15;
    });
    awayPlayers.forEach(function(p) {
      p.x = p.baseX + Math.sin(Date.now() / 900 + p.baseX) * 20;
      p.y = p.baseY + Math.cos(Date.now() / 1100 + p.baseY) * 15;
    });

    // Ball follows random player
    var target = Math.random() > 0.5 ? pick(homePlayers) : pick(awayPlayers);
    ballX += (target.x - ballX) * 0.1;
    ballY += (target.y - ballY) * 0.1;

    // Generate events
    if (minute - lastEventMin > 8 && Math.random() < 0.15) {
      lastEventMin = Math.floor(minute);
      var eventRoll = Math.random();
      var playerBonus = soldPlayer.rating / 100;

      if (eventRoll < 0.25 * playerBonus) {
        // Your player scores!
        homeScore++;
        yourPlayerGoals++;
        addCommentary(Math.floor(minute) + "' \u26BD GOAL! " + soldPlayer.name + " scores for " + soldPlayer.club + "!", 'goal-event');
        playSound('sell');
      } else if (eventRoll < 0.35) {
        // Your player assist
        homeScore++;
        yourPlayerAssists++;
        addCommentary(Math.floor(minute) + "' \u26BD GOAL! Assisted by " + soldPlayer.name + "!", 'goal-event');
        playSound('coin');
      } else if (eventRoll < 0.5) {
        // Home team scores (not your player)
        homeScore++;
        addCommentary(Math.floor(minute) + "' \u26BD " + soldPlayer.club + " score!", 'goal-event');
      } else if (eventRoll < 0.65) {
        // Away scores
        awayScore++;
        addCommentary(Math.floor(minute) + "' \u26BD " + opponent.name + " equalize!", 'goal-event');
      } else if (eventRoll < 0.75) {
        // Yellow card
        if (Math.random() < 0.3) {
          yourPlayerCards++;
          addCommentary(Math.floor(minute) + "' \u{1F7E8} Yellow card for " + soldPlayer.name, 'card-event');
        } else {
          addCommentary(Math.floor(minute) + "' \u{1F7E8} Yellow card shown", 'card-event');
        }
      } else {
        addCommentary(Math.floor(minute) + "' Good chance but saved by the keeper!", '');
      }
    }

    // Update UI
    document.getElementById('matchScore').textContent = soldPlayer.club + ' ' + homeScore + ' - ' + awayScore + ' ' + opponent.name;
    document.getElementById('matchMinute').textContent = Math.floor(Math.min(minute, 90)) + "'";
    document.getElementById('matchTimerBar').style.width = (Math.min(minute, 90) / 90 * 100) + '%';

    draw();

    if (minute >= 90) {
      matchOver = true;
      addCommentary("90' Full time! " + soldPlayer.club + " " + homeScore + " - " + awayScore + " " + opponent.name, '');

      setTimeout(function() {
        finishMatchDay(soldPlayer, opponent, homeScore, awayScore, yourPlayerGoals, yourPlayerAssists);
      }, 1000);
      return;
    }

    activeGame = requestAnimationFrame(update);
  }

  addCommentary("Kick off! " + soldPlayer.club + " vs " + opponent.name, '');
  addCommentary(soldPlayer.name + " (" + soldPlayer.rating + " rated) is in the starting lineup!", '');
  activeGame = requestAnimationFrame(update);
}

function finishMatchDay(soldPlayer, opponent, homeScore, awayScore, goals, assists) {
  var repBonus = 0;
  var isMOTM = goals >= 2 || (goals >= 1 && assists >= 1);

  if (goals > 0) repBonus += goals;
  if (assists > 0) repBonus += assists;
  if (isMOTM) repBonus += 2;
  if (homeScore > awayScore) repBonus += 1;

  state.reputation = clamp(state.reputation + repBonus, 0, 100);

  var resultHTML = '<div class="mini-game-result">';
  resultHTML += '<div style="font-size:14px;color:var(--muted);margin-bottom:8px;">FULL TIME</div>';
  resultHTML += '<div class="match-scoreboard">' + soldPlayer.club + ' ' + homeScore + ' - ' + awayScore + ' ' + opponent.name + '</div>';

  resultHTML += '<div style="margin:16px 0;">';
  resultHTML += '<div style="font-weight:700;font-size:16px;margin-bottom:8px;">' + soldPlayer.name + '\'s Performance</div>';
  if (goals > 0) resultHTML += '<div style="color:var(--green);">\u26BD Goals: ' + goals + '</div>';
  if (assists > 0) resultHTML += '<div style="color:var(--accent);">\u{1F3AF} Assists: ' + assists + '</div>';
  if (isMOTM) resultHTML += '<div style="color:var(--gold);font-weight:700;margin-top:8px;">\u{1F31F} MAN OF THE MATCH!</div>';
  if (goals === 0 && assists === 0) resultHTML += '<div style="color:var(--muted);">Quiet game, but gained experience</div>';
  resultHTML += '</div>';

  if (repBonus > 0) {
    resultHTML += '<div style="color:var(--gold);font-size:14px;">+' + repBonus + ' Reputation</div>';
  }

  resultHTML += '<button class="btn btn-primary" style="margin-top:16px;" onclick="closeBottomSheet();updateTopBar();renderCurrentTab();">DONE</button>';
  resultHTML += '</div>';

  document.getElementById('sheetContent').innerHTML = resultHTML;

  if (isMOTM) {
    showToast("\u{1F31F} " + soldPlayer.name + " is Man of the Match!", "success");
    confettiBurst();
  } else if (repBonus > 0) {
    showToast("\u{1F4AA} " + soldPlayer.name + " performed well! +" + repBonus + " rep", "success");
  }

  saveGame();
}

function isMultiplayer() { return state.gameMode === "multiplayer"; }

function getOpponentDisplayData() {
  return isMultiplayer() ? state.opponent : state.ivan;
}

// ─── ROOM CODE ──────────────────────────────────────────
function generateRoomCode() {
  var chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  var code = "";
  for (var i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

// ─── MATCH CREATION & JOINING ───────────────────────────
function createMatch() {
  initFirebase();
  if (!fbDb) { showToast("Firebase not configured! Add your config.", "error"); return; }

  var code = generateRoomCode();
  var secret = Math.random().toString(36).substring(2, 15);

  state.gameMode = "multiplayer";
  state.matchId = code;
  state.playerSlot = 1;
  state.playerSecret = secret;

  var matchData = {
    createdAt: Date.now(),
    status: "waiting",
    difficulty: state.difficulty,
    players: {
      player1: {
        secret: secret,
        name: document.getElementById("agencyNameInput").value.trim() || "Star Agency",
        slot: 1,
        joinedAt: Date.now(),
        season: 0, budget: 0, reputation: 0, careerEarnings: 0,
        rosterCount: 0, rosterTopRating: 0, lastMove: "",
        finished: false, finalGrade: null, finalEarnings: null
      }
    }
  };

  fbDb.ref("matches/" + code).set(matchData).then(function() {
    saveMpSession();
    showLobbyWaiting(code);
    // Listen for player2 to join
    fbDb.ref("matches/" + code + "/players/player2").on("value", function(snap) {
      if (snap.exists()) {
        var p2 = snap.val();
        state.opponent.name = p2.name;
        showToast("\u{1F3AE} " + p2.name + " joined the match!", "success");
        playSound('coin');
        confettiBurst();
        // Stop listening for join
        fbDb.ref("matches/" + code + "/players/player2").off();
        fbDb.ref("matches/" + code).update({ status: "active" });
        // Start game
        setTimeout(function() {
          hideLobby();
          startGameMultiplayer();
        }, 1500);
      }
    });
  }).catch(function(err) {
    showToast("Failed to create match: " + err.message, "error");
  });
}

function joinMatch(code) {
  initFirebase();
  if (!fbDb) { showToast("Firebase not configured!", "error"); return; }

  code = code.toUpperCase().trim();
  if (code.length !== 6) { showToast("Code must be 6 characters!", "error"); return; }

  fbDb.ref("matches/" + code).once("value").then(function(snap) {
    if (!snap.exists()) { showToast("Match not found!", "error"); return; }
    var match = snap.val();
    if (match.status !== "waiting") { showToast("Match already in progress!", "error"); return; }
    if (match.players && match.players.player2) { showToast("Match is full!", "error"); return; }

    // Check if match is stale (>48 hours)
    if (Date.now() - match.createdAt > 48 * 60 * 60 * 1000) {
      showToast("Match expired! Ask your friend to create a new one.", "error");
      return;
    }

    var secret = Math.random().toString(36).substring(2, 15);
    var name = document.getElementById("agencyNameInput").value.trim() || "Star Agency";

    state.gameMode = "multiplayer";
    state.matchId = code;
    state.playerSlot = 2;
    state.playerSecret = secret;
    state.difficulty = match.difficulty;
    state.opponent.name = match.players.player1.name;

    var p2Data = {
      secret: secret,
      name: name,
      slot: 2,
      joinedAt: Date.now(),
      season: 0, budget: 0, reputation: 0, careerEarnings: 0,
      rosterCount: 0, rosterTopRating: 0, lastMove: "",
      finished: false, finalGrade: null, finalEarnings: null
    };

    fbDb.ref("matches/" + code + "/players/player2").set(p2Data).then(function() {
      saveMpSession();
      showToast("\u2705 Joined " + state.opponent.name + "'s match!", "success");
      playSound('sign');
      setTimeout(function() {
        hideLobby();
        startGameMultiplayer();
      }, 800);
    });
  }).catch(function(err) {
    showToast("Error joining: " + err.message, "error");
  });
}

function startGameMultiplayer() {
  var nameInput = document.getElementById("agencyNameInput").value.trim();
  state.agencyName = nameInput || "Star Agency";

  if (state.difficulty === "rookie") state.budget = 5000000;

  state.season = 1;
  state.reputation = 10;
  state.careerEarnings = 0;
  state.roster = [];
  state.seasonLog = [];
  state.playerIdCounter = 1;
  state.seasonResultShown = false;
  state.ivan.roster = []; state.ivan.reputation = 15; state.ivan.careerEarnings = 0; state.ivan.lastMove = "";
  state.tutorialDismissed = false;
  state.trainedThisSeason = false;
  state.dealsThisSeason = false;

// ─── FIREBASE SYNC ──────────────────────────────────────
function syncToFirebase() {
  if (!isMultiplayer() || !fbDb || !state.matchId) return;

  var slot = "player" + state.playerSlot;
  var bestRating = state.roster.length > 0
    ? state.roster.reduce(function(a, b) { return a.rating > b.rating ? a : b; }).rating
    : 0;

  var lastSale = state.seasonLog.filter(function(l) { return l.type === "sale"; });
  var lastMove = lastSale.length > 0
    ? "Sold " + lastSale[lastSale.length - 1].playerName + " to " + lastSale[lastSale.length - 1].club + " for " + fmt(lastSale[lastSale.length - 1].amount)
    : state.roster.length > 0 ? "Has " + state.roster.length + " players" : "";

  var data = {
    secret: state.playerSecret,
    name: state.agencyName,
    slot: state.playerSlot,
    season: state.season,
    budget: state.budget,
    reputation: state.reputation,
    careerEarnings: state.careerEarnings,
    rosterCount: state.roster.length,
    rosterTopRating: bestRating,
    lastMove: lastMove,
    finished: false,
    finalGrade: null,
    finalEarnings: null
  };

  fbDb.ref("matches/" + state.matchId + "/players/" + slot).update(data).catch(function(e) {
    console.error("Sync failed:", e);
  });
}

function syncSeasonSnapshot() {
  if (!isMultiplayer() || !fbDb || !state.matchId) return;

  var slot = "player" + state.playerSlot;
  var salesThisSeason = state.seasonLog.filter(function(l) { return l.season === state.season && l.type === "sale"; });
  var bestDeal = salesThisSeason.length > 0
    ? salesThisSeason.reduce(function(a, b) { return a.amount > b.amount ? a : b; })
    : null;

  var snapshot = {
    budget: state.budget,
    reputation: state.reputation,
    careerEarnings: state.careerEarnings,
    bestDeal: bestDeal ? bestDeal.playerName + " to " + bestDeal.club + " for " + fmt(bestDeal.amount) : "No deals"
  };

  fbDb.ref("matches/" + state.matchId + "/players/" + slot + "/seasonSnapshots/" + state.season).set(snapshot);
}

// ─── FIREBASE LISTENERS ─────────────────────────────────
function startMultiplayerListeners() {
  if (!isMultiplayer() || !fbDb || !state.matchId) return;

  var oppSlot = state.playerSlot === 1 ? "player2" : "player1";
  fbListenerRef = fbDb.ref("matches/" + state.matchId + "/players/" + oppSlot);

  fbListenerRef.on("value", function(snap) {
    if (!snap.exists()) return;
    var data = snap.val();
    var prev = state.opponent;

    state.opponent = {
      name: data.name || "",
      season: data.season || 0,
      budget: data.budget || 0,
      reputation: data.reputation || 0,
      careerEarnings: data.careerEarnings || 0,
      rosterCount: data.rosterCount || 0,
      rosterTopRating: data.rosterTopRating || 0,
      lastMove: data.lastMove || "",
      finished: data.finished || false,
      finalGrade: data.finalGrade || null,
      finalEarnings: data.finalEarnings || null
    };

    // Toast for notable opponent events
    if (prev.careerEarnings > 0 && data.careerEarnings > prev.careerEarnings) {
      showToast("\u{1F4E1} " + data.name + " made a deal!", "info");
    }
    if (data.finished && !prev.finished) {
      showToast("\u{1F3C1} " + data.name + " finished their career!", "info");
      playSound('coin');
    }

    // Re-render hub if on it
    if (state.currentTab === "hub") renderCurrentTab();
  });
}

function stopMultiplayerListeners() {
  if (fbListenerRef) { fbListenerRef.off(); fbListenerRef = null; }
}

// ─── MP SESSION PERSISTENCE ─────────────────────────────
function saveMpSession() {
  try {
    localStorage.setItem("fat_mp_session", JSON.stringify({
      matchId: state.matchId,
      playerSlot: state.playerSlot,
      playerSecret: state.playerSecret
    }));
  } catch(e) {}
}

function loadMpSession() {
  try {
    var s = localStorage.getItem("fat_mp_session");
    return s ? JSON.parse(s) : null;
  } catch(e) { return null; }
}

function deleteMpSession() {
  localStorage.removeItem("fat_mp_session");
  localStorage.removeItem("fat_mp_state");
}

function reconnectMultiplayer() {
  var session = loadMpSession();
  if (!session) { showToast("No match to reconnect to.", "error"); return; }

  initFirebase();
  if (!fbDb) { showToast("Firebase not configured!", "error"); return; }

  state.matchId = session.matchId;
  state.playerSlot = session.playerSlot;
  state.playerSecret = session.playerSecret;
  state.gameMode = "multiplayer";

  // Load local state
  var savedState = localStorage.getItem("fat_mp_state");
  if (savedState) {
    var parsed = JSON.parse(savedState);
    Object.assign(state, parsed);
    if (!state.soldPlayers) state.soldPlayers = [];
  }

  document.getElementById("splashScreen").classList.add("hidden");
  document.getElementById("app").style.display = "flex";
  updateTopBar();
  startMultiplayerListeners();
  showTab(state.currentTab || "hub");
}

// ─── MULTIPLAYER END GAME ───────────────────────────────
function handleMultiplayerEndGame() {
  // Write final data to Firebase
  var allSales = state.seasonLog.filter(function(l) { return l.type === "sale"; });
  var grade;
  if (state.careerEarnings > 50000000) grade = "S+";
  else if (state.careerEarnings > 35000000) grade = "S";
  else if (state.careerEarnings > 25000000) grade = "A";
  else if (state.careerEarnings > 15000000) grade = "B";
  else if (state.careerEarnings > 8000000) grade = "C";
  else grade = "D";

  var slot = "player" + state.playerSlot;
  fbDb.ref("matches/" + state.matchId + "/players/" + slot).update({
    finished: true,
    finalGrade: grade,
    finalEarnings: state.careerEarnings
  });

  if (state.opponent.finished) {
    showFinalScreenMultiplayer(grade);
  } else {
    showWaitingForOpponent(grade);
  }
}

function showWaitingForOpponent(myGrade) {

      fbDb.ref("matches/" + state.matchId + "/players/" + oppSlot).once("value").then(function(oppSnap) {

        state.opponent.careerEarnings = d.careerEarnings;

function showFinalScreenMultiplayer(myGrade) {

  var tie = myEarnings === oppEarnings;
  var winner = tie ? (state.reputation > (state.opponent.reputation || 0) ? "me" : "opp") : (iWin ? "me" : "opp");
  if (tie && state.reputation === (state.opponent.reputation || 0)) winner = "tie";

  var allSales = state.seasonLog.filter(function(l) { return l.type === "sale"; });

  var html = '';
  html += '<div style="font-size:14px;color:var(--muted);letter-spacing:4px;margin-bottom:4px;">MATCH COMPLETE</div>';
  html += '<div style="width:80px;height:2px;background:var(--accent);margin:8px auto 16px;"></div>';

    html += '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:42px;" class="mp-winner">\u{1F3C6} YOU WIN!</div>';

    html += '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:42px;" class="mp-loser">\u{1F625} YOU LOSE</div>';

  // Side by side comparison
