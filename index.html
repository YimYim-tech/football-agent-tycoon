  // My column
  html += '<div class="final-vs-col">';
  html += '<div style="font-size:12px;color:var(--muted);">YOU</div>';
  html += '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:20px;color:var(--accent);">' + state.agencyName + '</div>';
  html += '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:48px;' + (winner === "me" ? 'color:var(--gold);' : '') + '">' + myGrade + '</div>';
  html += '<div class="money" style="font-size:16px;">' + fmt(myEarnings) + '</div>';
  html += '<div style="font-size:12px;color:var(--muted);">' + allSales.length + ' deals</div>';
  html += '<div style="font-size:12px;color:var(--gold);">\u2B50 ' + state.reputation + '</div>';
  html += '</div>';

  // VS divider
  html += '<div class="final-vs-divider">VS</div>';

  // Opponent column
  html += '<div class="final-vs-col">';
  html += '<div style="font-size:12px;color:var(--muted);">RIVAL</div>';
  html += '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:20px;color:var(--green);">' + (state.opponent.name || 'Opponent') + '</div>';
  html += '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:48px;' + (winner === "opp" ? 'color:var(--gold);' : '') + '">' + oppGrade + '</div>';
  html += '<div class="money" style="font-size:16px;">' + fmt(oppEarnings) + '</div>';
  html += '<div style="font-size:12px;color:var(--muted);">--</div>';
  html += '<div style="font-size:12px;color:var(--gold);">\u2B50 ' + (state.opponent.reputation || 0) + '</div>';
  html += '</div>';

  html += '</div>'; // end final-vs

  html += '<button class="btn btn-primary" style="margin-top:20px;max-width:350px;" onclick="resetGameMultiplayer()">\u{1F504} PLAY AGAIN</button>';

  screen.innerHTML = html;
  screen.classList.add("show");
  confettiBurst();
  if (winner === "me") playSound('sell');

  // Mark match finished
  fbDb.ref("matches/" + state.matchId).update({ status: "finished" });
  deleteMpSession();
}

function resetGameMultiplayer() {
  stopMultiplayerListeners();
  state.gameMode = "solo";
  state.matchId = null;
  state.playerSlot = null;
  state.playerSecret = null;
  state.opponent = { name:"", season:0, budget:0, reputation:0, careerEarnings:0, rosterCount:0, rosterTopRating:0, lastMove:"", finished:false, finalGrade:null, finalEarnings:null };
  deleteMpSession();
  resetGame();
}

  html += '<div style="font-size:13px;color:var(--muted);margin:8px 0 16px;">Share this code with your friend:</div>';
  html += '<div class="room-code-display">' + code + '</div>';
  html += '<button class="btn btn-primary" style="max-width:280px;margin-bottom:12px;" onclick="navigator.clipboard.writeText(\'' + code + '\');showToast(\'Code copied!\',\'success\')">\u{1F4CB} COPY CODE</button>';
  html += '<div class="waiting-text">\u23F3 Waiting for opponent to join...</div>';
  html += '<button class="btn btn-outline" style="max-width:280px;margin-top:24px;" onclick="cancelMatchCreation()">\u274C CANCEL</button>';

  showLobbyScreen(html);
}

function showJoinUI() {
  var html = '';
  html += '<div style="font-size:48px;margin-bottom:12px;">\u{1F517}</div>';
  html += '<div class="splash-title" style="font-size:24px;">JOIN MATCH</div>';
  html += '<div style="font-size:13px;color:var(--muted);margin:8px 0 16px;">Enter the 6-character room code:</div>';
  html += '<input class="room-code-input" id="roomCodeInput" type="text" placeholder="ABC123" maxlength="6" autocomplete="off">';
  html += '<button class="btn btn-green" style="max-width:280px;margin-top:16px;" onclick="joinMatch(document.getElementById(\'roomCodeInput\').value)">\u2705 JOIN</button>';
  html += '<button class="btn btn-outline" style="max-width:280px;margin-top:8px;" onclick="showModeSelector()">\u2190 BACK</button>';

  showLobbyScreen(html);
}

function cancelMatchCreation() {
  if (state.matchId && fbDb) {
    fbDb.ref("matches/" + state.matchId + "/players/player2").off();
    fbDb.ref("matches/" + state.matchId).remove();
  }
  state.gameMode = "solo";
  state.matchId = null;
  deleteMpSession();
  hideLobby();
}

// ─── OPPONENT CARD (replaces Ivan in Hub) ───────────────
function renderOpponentCard() {
  var opp = getOpponentDisplayData();

  if (isMultiplayer()) {
    var html = '<div class="opponent-card">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;">';
    html += '<div style="font-weight:700;">\u{1F3AE} ' + (opp.name || 'Opponent') + ' <span class="mp-badge">LIVE</span></div>';
    html += '<div style="font-size:12px;color:var(--gold);">\u2B50 ' + (opp.reputation || 0) + '</div>';
    html += '</div>';
    html += '<div style="font-size:13px;color:var(--muted);margin-top:6px;">';
    html += 'Season ' + (opp.season || '?') + ' \u00B7 Budget: ' + fmt(opp.budget || 0) + ' \u00B7 Players: ' + (opp.rosterCount || 0);
    html += '</div>';
    html += '<div style="font-size:12px;color:var(--green);margin-top:4px;">Earnings: ' + fmt(opp.careerEarnings || 0) + '</div>';
    if (opp.lastMove) html += '<div style="font-size:12px;color:var(--accent);margin-top:4px;">' + opp.lastMove + '</div>';
    if (opp.finished) html += '<div style="font-size:12px;color:var(--gold);margin-top:4px;font-weight:700;">\u{1F3C1} Finished career! Grade: ' + (opp.finalGrade || '?') + '</div>';
    html += '</div>';
    return html;
  } else {
    // Ivan card (original)
    var html = '<div class="ivan-card">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;">';
    html += '<div style="font-weight:700;">\u{1F916} IVAN DRAGO AGENCY</div>';
    html += '<div style="font-size:12px;color:var(--muted);">\u2B50 ' + state.ivan.reputation + '</div>';
    html += '</div>';
    html += '<div style="font-size:13px;color:var(--muted);margin-top:6px;">Budget: ' + fmt(state.ivan.budget) + ' \u00B7 Players: ' + state.ivan.roster.length + '</div>';
    if (state.ivan.lastMove) html += '<div style="font-size:12px;color:var(--red);margin-top:4px;">Last: ' + state.ivan.lastMove + '</div>';
    html += '</div>';
    return html;
  }
}

// ─── GAME INIT ─────────────────────────────────────────
function selectDifficulty(diff, el) {
  document.querySelectorAll(".diff-btn").forEach(function(b) { b.classList.remove("selected"); });
  el.classList.add("selected");
  state.difficulty = diff;
}

function startGame() {
  var nameInput = document.getElementById("agencyNameInput").value.trim();
  state.agencyName = nameInput || "Star Agency";

  if (state.difficulty === "rookie") state.budget = 5000000;
  else if (state.difficulty === "pro") state.budget = 3000000;
  else state.budget = 1500000;

  state.ivan.budget = state.budget * 0.6;
  state.season = 1;
  state.reputation = 10;
  state.careerEarnings = 0;
  state.roster = [];
  state.seasonLog = [];
  state.playerIdCounter = 1;
  state.seasonResultShown = false;
  state.ivan.roster = [];
  state.ivan.reputation = 15;
  state.ivan.careerEarnings = 0;
  state.ivan.lastMove = "";
  state.tutorialDismissed = false;
  state.trainedThisSeason = false;
  state.dealsThisSeason = false;
  state.soldPlayers = [];
  state.johnPedroSeen = false;

  pickWorldEvent();
  generateScoutPool();
  generateClubOffers();

  document.getElementById("splashScreen").classList.add("hidden");
  document.getElementById("app").style.display = "flex";
  updateTopBar();

  saveGame();

  showSeasonTransition(1, function() {
    showTab("hub");
  });
}

// FIX #3: Continue from save
function continueGame() {
  if (!loadGame()) return;

  document.getElementById("splashScreen").classList.add("hidden");
  document.getElementById("app").style.display = "flex";
  updateTopBar();

  // Update mute button state
  document.getElementById("muteBtn").innerHTML = state.soundMuted ? "&#128263;" : "&#128266;";

  showTab(state.currentTab || "hub");
}

function resetGame() {
  stopMultiplayerListeners();
  state.gameMode = "solo";
  state.matchId = null;
  state.playerSlot = null;
  state.playerSecret = null;
  state.opponent = { name:"", season:0, budget:0, reputation:0, careerEarnings:0, rosterCount:0, rosterTopRating:0, lastMove:"", finished:false, finalGrade:null, finalEarnings:null };
  document.getElementById("finalScreen").classList.remove("show");
  document.getElementById("seasonEndScreen").classList.remove("show");
  document.getElementById("app").style.display = "none";
  document.getElementById("splashScreen").classList.remove("hidden");
  state.season = 1;
  state.roster = [];
  state.clubOffers = [];
  state.availablePlayers = [];
  state.seasonLog = [];
  state.careerEarnings = 0;
  state.reputation = 10;
  state.playerIdCounter = 1;
  state.seasonResultShown = false;
  state.tutorialDismissed = false;
  state.trainedThisSeason = false;
  state.dealsThisSeason = false;
  state.soldPlayers = [];
  state.johnPedroSeen = false;
  deleteSave();
  checkContinueButton();
}

// FIX #3: Show/hide continue button on splash based on save existence
function checkContinueButton() {
  var btn = document.getElementById("continueBtn");
  if (hasSave()) {
    btn.style.display = "block";
  } else {
    btn.style.display = "none";
  }
  // Check for multiplayer reconnect
  var rcBtn = document.getElementById("reconnectBtn");
  if (rcBtn) {
    var mpSession = loadMpSession();
    rcBtn.style.display = mpSession ? "block" : "none";
  }
}

// On page load, check for existing save
checkContinueButton();
</script>
</body>
</html>
